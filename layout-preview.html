<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>云中书 — 15种布局预览</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(26,26,46,0.95); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1); padding: 12px 20px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.nav h1 { font-size: 16px; color: #fff; white-space: nowrap; }
.nav-btn { padding: 6px 14px; border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; background: transparent; color: #ccc; cursor: pointer; font-size: 13px; transition: all 0.2s; white-space: nowrap; }
.nav-btn:hover, .nav-btn.active { background: #c4956a; color: #fff; border-color: #c4956a; }
.container { padding: 80px 20px 40px; max-width: 1400px; margin: 0 auto; }
.grid { display: grid; grid-template-columns: 1fr; gap: 40px; }
.layout-card { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
.layout-label { background: linear-gradient(135deg, #c4956a, #a07850); color: #fff; padding: 12px 20px; font-size: 15px; font-weight: 700; display: flex; justify-content: space-between; align-items: center; }
.layout-label span { font-size: 12px; opacity: 0.8; font-weight: 400; }
.layout-body { padding: 0; max-height: 800px; overflow-y: auto; }
.layout-body::-webkit-scrollbar { width: 4px; }
.layout-body::-webkit-scrollbar-thumb { background: #ccc; border-radius: 2px; }

/* 通用配色: 奶茶温柔 */
:root {
  --bg: #faf6f1;
  --content-bg: #ffffff;
  --primary: #c4956a;
  --secondary: #f0e6d6;
  --accent: #d4a574;
  --text: #4a3728;
  --text-muted: #8b7355;
}
</style>
</head>
<body>

<nav class="nav">
  <h1>☁️ 云中书 — 15种布局对比</h1>
  <button class="nav-btn active" onclick="showAll()">全部展示</button>
  <button class="nav-btn" onclick="scrollTo('L01')">L01 极简流线</button>
  <button class="nav-btn" onclick="scrollTo('L02')">L02 学术论文</button>
  <button class="nav-btn" onclick="scrollTo('L03')">L03 左色条</button>
  <button class="nav-btn" onclick="scrollTo('L04')">L04 经典散文</button>
  <button class="nav-btn" onclick="scrollTo('L05')">L05 日式留白</button>
  <button class="nav-btn" onclick="scrollTo('L06')">L06 首字下沉</button>
  <button class="nav-btn" onclick="scrollTo('L07')">L07 杂志编排</button>
  <button class="nav-btn" onclick="scrollTo('L08')">L08 色块标签</button>
  <button class="nav-btn" onclick="scrollTo('L09')">L09 双线框题</button>
  <button class="nav-btn" onclick="scrollTo('L10')">L10 卡片分区</button>
  <button class="nav-btn" onclick="scrollTo('L11')">L11 交替色带</button>
  <button class="nav-btn" onclick="scrollTo('L12')">L12 时间线</button>
  <button class="nav-btn" onclick="scrollTo('L13')">L13 问答对话</button>
  <button class="nav-btn" onclick="scrollTo('L14')">L14 复古报刊</button>
  <button class="nav-btn" onclick="scrollTo('L15')">L15 霓虹科技</button>
</nav>

<div class="container">
<div class="grid" id="grid"></div>
</div>

<script>
function scrollTo(id) {
  document.getElementById(id)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
function showAll() {}

// 统一素材：知乎文章节选
const ARTICLE = {
  title: '云中书 YunType：一个开源AI排版引擎的诞生',
  subtitle: '660种排版组合，让公众号和小红书创作效率翻10倍',
  lead: '我是一个经常写公众号和小红书的创作者。每次文章写完，排版这件事就让我抓狂。于是我用 React + TypeScript 从零做了一个完全免费、完全开源的 AI 排版引擎——云中书 YunType。',
  h2_1: '为什么要做这个工具？',
  h3_1: '公众号排版的痛',
  p1: '如果你写过微信公众号文章，一定经历过这样的场景：花了2个小时写完一篇3000字的深度文章，打开公众号后台，开始排版。字号要调、行间距要改、标题样式要统一、配色要协调……又花了1个小时。',
  p2: '更崩溃的是，你精心调好的排版，换一台手机打开发现字体全变了。',
  quote: '粘贴 Markdown 文章 → 选个风格 → 一键复制到公众号。如果是小红书，直接帮我把文章自动切成一组图片，打包下载。',
  h3_2: '小红书排版的痛',
  p3: '如果说公众号排版是"折磨"，小红书排版就是"酷刑"。小红书是图片平台，你的文字文章需要变成一组精美的图片。一篇3000字的攻略，你可能需要手动把文字分成10-15张图。',
  list: ['手动把文字分成 10-15 张图', '每张图保持一致的背景色、字体、排版风格', '封面要有冲击力', '尾页要有互动引导'],
  h2_2: '产品全貌：三栏式工作台',
  p4: '打开云中书，你会看到一个三栏式工作台。左栏是文章输入区，一个全屏的 Markdown 编辑器，支持实时字数统计。中栏是风格控制面板，包含6个标签页。右栏是实时预览区。',
  table: [
    ['工具', '优点', '痛点'],
    ['秀米', '模板多', '同质化严重，高级功能收费'],
    ['135编辑器', '组件丰富', '学习曲线陡峭，会员制'],
    ['Canva', '设计感强', '偏图片设计，文字排版弱'],
  ],
  h2_3: '核心功能：660种原子化排版组合',
  p5: '传统排版工具提供"模板"。模板的问题是：好看的就那几个，用的人多了就撞款。你的文章和别人看起来一模一样。云中书不做模板，做的是四个维度的自由组合。',
  code: '排版方案 = 配色(11种) × 排版(5种) × 装饰(4种) × 字体(3种)\n        = 660 种独特组合',
};

const A = ARTICLE;

// ============================================================
// 15种布局的HTML生成

const layouts = [

// ── L01 极简流线 ──
{

{

<section style="background:#fff;padding:24px 28px;color:var(--text);font-size:15px;line-height:1.75;">

    <p style="margin:0;color:#80cbc4;font-size:14px;">💡 ${A.quote}</p>
  </section>
  <h3 style="font-size:15px;font-weight:600;color:#7c4dff;margin:18px 0 8px;">## ${A.h3_2}</h3>
  <p style="margin:0 0 14px;color:#b0bec5;">${A.p3}</p>
  ${A.list.map(i=>`<p style="margin:0 0 6px;color:#b0bec5;padding-left:18px;"><span style="color:#00e5ff;">▸</span> ${i}</p>`).join('')}
  <section style="height:2px;background:linear-gradient(90deg,#7c4dff,#00e5ff,transparent);margin:20px 0;"></section>
  <h2 style="font-size:18px;font-weight:700;color:#00e5ff;margin:0 0 12px;padding-left:14px;border-left:4px solid #00e5ff;text-shadow:0 0 8px rgba(0,229,255,0.2);">${A.h2_2}</h2>
  <p style="margin:0 0 14px;color:#b0bec5;">${A.p4}</p>
  <!-- 代码块 -->
  <section style="background:#0d1117;border:1px solid rgba(0,229,255,0.15);padding:14px 18px;border-radius:4px;margin:14px 0;">
    <pre style="margin:0;color:#39ff14;font-size:13px;line-height:1.6;font-family:Menlo,Consolas,monospace;white-space:pre-wrap;">${A.code}</pre>
  </section>
</section>`
},

]; // end layouts

// ============================================================
// 渲染
// ============================================================
const grid = document.getElementById('grid');
layouts.forEach(layout => {
  const card = document.createElement('div');
  card.className = 'layout-card';
  card.id = layout.id;
  card.innerHTML = `
    <div class="layout-label">
      ${layout.id} · ${layout.name}
      <span>${layout.desc}</span>
    </div>
    <div class="layout-body">${layout.html}</div>
  `;
  grid.appendChild(card);
});
</script>
</body>
</html>
